name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff
      - name: Lint
        run: ruff check .
      - name: Test
        # no keys_local.py in CI -> test_sign falls back to an ephemeral keypair,
        # test_units needs no keys. Both run green on a bare checkout.
        run: pytest -q
