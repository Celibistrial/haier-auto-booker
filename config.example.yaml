# Copy to config.yaml and fill in. config.yaml is gitignored.
# You ALSO need keys: cp keys_local.example.py keys_local.py and fill it in
# (appId/appSecret/RSA keys from your own APK). See keys.py.

prod: true                 # true = www.mrhiwash.com, false = test.mrhi.cn

# --- account (your own, single account) ---
# phoneNumber format confirmed from real traffic: "00" + country code + number
# (NO plus sign). e.g. India 9876543210 -> "00919876543210".
phone: "00<countrycode><number>"
password: "your-password"   # plaintext inside the encrypted bizcontent
android_user_id: "null"     # app literally sends the string "null"; server accepts it
login_type: "2"             # confirmed: 2 = phone + password

# --- locale (cosmetic envelope fields; server ignores them) ---
country: "IN"
language: "en"
time_zone: "IST"

# --- target ---
# Run `python main.py --discover` first to print laundryIds near you.
laundry_id: "123456"
dev_type: "1"               # 1/3 = washer family, else dryer (from fragment routing)
floor: ""                   # optional floorNumber filter
target_device_ids: []       # optional watchlist; empty = any free machine
prefer_mode_id: ""          # optional; else picks current/first runMode

# discovery coordinates (only used by --discover)
longitude: 0.0
latitude: 0.0

# --- behavior ---
poll_interval_sec: 30       # steady-state interval (>= 10). NOTE: even with
                            # race_mode false, pace() tightens toward poll_floor_sec
                            # as a machine nears finishing — so the real fastest
                            # poll is poll_floor_sec, not 10s. Keep poll_floor_sec
                            # high if you want to stay courteous.
max_reserves: 1             # how many to reserve, used non-interactively (cron/--once);
                            # an interactive run asks you instead
request_timeout_sec: 10     # per-request HTTP timeout
ntfy_url: ""                # optional push, e.g. https://ntfy.sh/your-private-topic

# --- race mode (OFF by default; read the warning) ---
# When true, the loop ignores poll_interval_sec and polls at poll_floor_sec
# constantly to grab a machine's brief status-2 subscription window before others.
# Sustained fast polling loads a server you don't own and can trip rate-limiting /
# anomaly bans, and racing shared machines harms other users. Leave this false
# unless you understand and accept that.
race_mode: false
poll_floor_sec: 3.0         # fastest interval the loop will ever poll at (seconds)
race_heartbeat_sec: 5       # how often to print an "alive" line when nothing changes

# booking endpoint: orderDevice (app's real book path) | reserve (appointment/YUYUE)
# Booking is status-aware regardless: status-1 FREE -> orderDevice (book now),
# status-2 IN_USE_SUBSCRIBE -> reserve (next-cycle appointment). Set "reserve"
# to force appointment-only.
book_method: ""
is_rq: 1                    # orderDevice remote flag (1=remote/no-scan; 2=QR-scanned)
run_count: "1"              # wash-cycle count

token_cache: ".token.json"
